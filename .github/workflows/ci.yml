name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install PySide6
      - name: Run tests
        run: python -m pytest tests/ -q
        env:
          QT_QPA_PLATFORM: offscreen
